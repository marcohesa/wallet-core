spring.application.name=wallet-core

# Configuración de la base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wallet_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:wallet_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:wallet_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configuración de Flyway para las migraciones
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true